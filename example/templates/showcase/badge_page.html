{% extends "showcase/base.html" %}

{% block title %}Badge Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Badges</h2>
    <p class="text-base-content/70">Small status indicators and labels.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">
    <div>
        <h3 class="text-lg font-semibold mb-4">Variants</h3>
        <div class="flex flex-wrap gap-4 items-center">
            <c-ds.badge variant="primary">Primary</c-ds.badge>
            <c-ds.badge variant="secondary">Secondary</c-ds.badge>
            <c-ds.badge variant="accent">Accent</c-ds.badge>
            <c-ds.badge variant="neutral">Neutral</c-ds.badge>
            <c-ds.badge variant="info">Info</c-ds.badge>
            <c-ds.badge variant="success">Success</c-ds.badge>
            <c-ds.badge variant="warning">Warning</c-ds.badge>
            <c-ds.badge variant="error">Error</c-ds.badge>
        </div>
    </div>

    <div>
        <h3 class="text-lg font-semibold mb-4">Modifiers</h3>
        <div class="flex flex-wrap gap-4 items-center">
            <c-ds.badge _style="outline">Outline</c-ds.badge>
            <c-ds.badge class="ghost">Ghost (via class)</c-ds.badge>
        </div>
    </div>
</section>
{% endblock %}
