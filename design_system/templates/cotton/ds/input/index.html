{% comment %}
DaisyUI Input Component

https://daisyui.com/components/input/
{% endcomment %}

<c-vars
    class=""
    as="input"
    type="text"
    color=""
    style_=""
    size="md"
    placeholder=""
    :colorClasses="{
        'primary': 'input-primary',
        'control': 'input-control',
        'secondary': 'input-secondary',
        'accent': 'input-accent',
        'info': 'input-info',
        'success': 'input-success',
        'warning': 'input-warning',
        'error': 'input-error',
        'neutral': 'input-neutral'
    }"
    :styleClasses="{
        'ghost': 'input-ghost'
    }"
    :sizeClasses="{
        'xs': 'input-xs',
        'sm': 'input-sm',
        'md': 'input-md',
        'lg': 'input-lg',
        'xl': 'input-xl'
    }"
/>

<{{ as }}
    type="{{ type }}"
    class="
        {{ colorClasses|get_item:color }}
        {{ styleClasses|get_item:style_ }}
        {{ sizeClasses|get_item:size }}
        {{ class }}
    "
    {{ attrs }}
>
</{{ as }}>
